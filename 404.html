<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>404 Not Found - Stackly Startup Agency</title>

    
    <link rel="shortcut icon" href="assets/top-logo.webp" type="image/x-icon" />
    <link rel="icon" href="assets/top-logo.webp" type="image/x-icon" />

    
    <link href="https://php.kodesolution.com/2025/techix-php/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://php.kodesolution.com/2025/techix-php/css/style.css" rel="stylesheet" />
    <link href="https://php.kodesolution.com/2025/techix-php/css/responsive.css" rel="stylesheet" />

    
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        .logo img,
        .sticky-header .logo img {
            max-height: 40px;
            filter: none;
        }

        .footer-one__logo .logo img {
            filter: none;
        }

        .error-page {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .error-text {
            font-size: 12rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--theme-color1), var(--theme-color3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        .error-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 30rem;
            font-weight: 900;
            color: rgba(45, 30, 226, 0.03);
            z-index: 0;
            user-select: none;
            pointer-events: none;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css?v=11" />
</head>

<body>

    
    <div class="page-wrapper">
        
        <div id="custom-cursor-wrapper" class="tp-cursor">
            <div id="cursor-outer">
                <div id="cursorDot"></div>
            </div>
        </div>

        <div id="smooth-wrapper">
            <div id="smooth-content">

                
                <section class="error-page section-bg" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0;">
                    <div class="error-bg" style="font-size: 35rem !important;">404</div>
                    <div class="container text-center position-relative z-1 ks_fade_anim" data-delay=".3" data-fade-from="top">
                        <div class="mb-4">
                            <a href="index.html">
                                <img src="assets/logo.webp" alt="Stackly Logo" style="max-height: 50px; object-fit: contain;" />
                            </a>
                        </div>
                        <h1 class="error-text mb-0">404</h1>
                        <h2 class="fw-bold mb-4 text-dark">Oops! Page Not Found.</h2>
                        <p class="text-muted mb-5 mx-auto" style="max-width: 500px;">
                            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Or it's a dummy link for demonstration!
                        </p>
                        <div style="display: flex; justify-content: center; gap: 16px; margin-top: 24px; flex-wrap: wrap;">
                            <a href="index.html" class="theme-btn-main" style="text-decoration: none;">
                                <span class="theme-btn-arrow-left"><i class="fa-solid fa-house"></i></span>
                                <span class="theme-btn">Back to Home</span>
                                <span class="theme-btn-arrow-right"><i class="fa-solid fa-arrow-right-long"></i></span>
                            </a>
                            <a href="javascript:history.back()" class="theme-btn-main" style="text-decoration: none;">
                                <span class="theme-btn-arrow-left"><i class="fa-solid fa-arrow-left-long"></i></span>
                                <span class="theme-btn">Go Back</span>
                                <span class="theme-btn-arrow-right"><i class="fa-solid fa-arrow-right-long"></i></span>
                            </a>
                        </div>
                    </div>
                </section>

        
        <script src="https://php.kodesolution.com/2025/techix-php/js/jquery.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/popper.min.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/bootstrap.min.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/gsap.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/gsap-scroll-to-plugin.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/gsap-scroll-smoother.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/gsap-scroll-trigger.js"></script>
        <script src="https://php.kodesolution.com/2025/techix-php/js/script.js"></script>

</body>

</html>
